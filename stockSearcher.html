<!DOCTYPE html>
<html lang="en">
    <head>
        <title>jamsBot</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body>
        <h1 class="page-title"> Say hello to <span class="brand">jamsBot</span></h1>
        <form class="search-container" id="search-form">
            <input type="text" id="search-input" placeholder="Enter Stock Symbol...">
            <button type="submit" id="search-button">Search</button>
        </form>
        <div class="data SOI">
            <h3 class="data-title"> Stocks of Interest</h3>
            <p class="data-text" id="SOI"> The top 10 most interesting stocks will go here</p>
        </div>
        <div class="data jamsAI">
            <h3 class="data-title"> jamsAI</h3>
            <p class="data-text" id="jamsAI"> The output of the stock-data bot will go here</p>
        </div>
        <div class="data News">
            <h3 class="data-title"> News</h3>
            <p class="data-text" id="News"> Current relevant news will go here</p>
        </div>
        <div class="data SMedia">
            <h3 class="data-title"> Social Media</h3>
            <p class="data-text" id="SMedia"> Current relevant social media will go here</p>
        </div>
        <div class="chat">
            <h3 class="data-title"> Chat</h3>
            <p class="data-text" id="chat"> Say something...</p>
        </div>
        <script>
            document.getElementById('search-form').addEventListener('submit', async function(e){
                e.preventDefault()
                let symbolInput = document.getElementById('search-input');
                let symbol = symbolInput.value.trim()
                if (!symbol) return;

                let chatBox = document.getElementById('chat')
                let SMediaBox = document.getElementById('SMedia')
                try {
                    let resp = await fetch(`/api/summary?ticker=${encodeURIComponent(symbol)}`);
                    if (!resp.ok){
                        throw new Error(`Server returned ${resp.status}`);
                    }
                    let data = await resp.json();
                    let edgar = data.edgar.length ? data.edgar.map(item => `<p class="data-text"><strong>${item.title || 'Filing'}</strong><br>${(item.text || '').slice(0, 150)}</p>`).join(''): '<p class="data-text">No recent EDGAR filings.</p>';
                    let stocktwits = data.stocktwits.length? data.stocktwits.map(item => `<p class="data-text">${(item.text || '').slice(0, 150)}</p>`).join(''): '<p class="data-text">No recent StockTwits mentions.</p>';
                    
                    SMediaBox.innerHTML = 
                        `<p class = "data-title">${data.ticker}</p>` + 
                        `<p class="data-title" style="margin-top:1vh;">EDGAR</p>` + edgar +
                        `<p class="data-title" style="margin-top:1vh;">StockTwits</p>` + stocktwits;
                    
                chatBox.innerHTML = '<p class="data-text">Showing results for <strong>${data.ticker}</strong>.</p>';
                }
                catch (e) {
                    chatBox.innerHTML = `<p class="data-text">Error fetching data: ${e.message}</p>`;
                }
            })
        </script>
    </body>
</html>
